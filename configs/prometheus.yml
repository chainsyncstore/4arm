# Prometheus configuration for 4ARM monitoring
# Reference config - copy to your Prometheus installation

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 4ARM Backend API metrics
  - job_name: "fourarm-backend"
    static_configs:
      - targets: ["backend:8000", "localhost:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Node Exporter for system metrics (CPU, RAM, disk)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  # cAdvisor for container metrics
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 15s
